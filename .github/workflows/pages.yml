name: Deploy GitHub Pages

# Rebuilds and redeploys the static site on every push to main,
# and can also be triggered manually from the Actions tab.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Minimum permissions required for the GITHUB_TOKEN to publish to Pages.
# contents: read  -> checkout the repo
# pages: write    -> deploy to the github-pages environment
# id-token: write -> sign the deployment so GitHub can verify its origin
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment should run at a time; if a new push arrives
# while a deployment is in progress, let the in-flight one finish first.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Packages the entire repository (excluding .git and .github, which
      # this action always strips automatically) as the Pages artifact.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
